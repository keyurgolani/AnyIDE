# AnyIDE Configuration
server:
  host: "0.0.0.0"
  port: 8080
  cors_origins:
    - "*"

workspace:
  base_dir: "/workspace"
  
secrets:
  file: "/secrets/secrets.env"
  
auth:
  admin_password: "admin"
  session_timeout_hours: 24

hitl:
  default_ttl_seconds: 300
  notification_sound: true
  auto_reject_on_expiry: true

audit:
  retention_days: 30
  log_level: "INFO"

modules:
  # Empty enabled list => all built-in modules are enabled.
  enabled: []
  disabled: []

skills:
  base_dir: "/skills"

language:
  linters:
    python: "ruff"
    javascript: "biome"
    typescript: "biome"
    go: "golangci-lint"
  lsp_servers:
    python: "pyright"
    typescript: "typescript-language-server"
    go: "gopls"

# Tool Policies
tools:
  defaults:
    workspace_override: "hitl"
    
  fs:
    read:
      policy: "allow"
      workspace_override: "allow"
    write:
      policy: "allow"
      hitl_patterns:
        - "*.conf"
        - "*.env"
        - "*.yaml"
        - "*.yml"
      block_patterns:
        - "*.exe"
        - "*.bin"
      workspace_override: "hitl"
    search:
      policy: "allow"
    list:
      policy: "allow"
      
  workspace:
    info:
      policy: "allow"
    secrets_list:
      policy: "allow"

  language:
    read_file:
      policy: "allow"
    skeleton:
      policy: "allow"
    diff:
      policy: "allow"
    apply_patch:
      policy: "allow"
      workspace_override: "hitl"
    create_file:
      policy: "allow"
      workspace_override: "hitl"
    index:
      policy: "allow"
    search_symbols:
      policy: "allow"
    reference_graph:
      policy: "allow"
    validate:
      policy: "allow"

  skills:
    list:
      policy: "allow"
    read:
      policy: "allow"
    read_file:
      policy: "allow"
    search:
      policy: "allow"
    install:
      policy: "hitl"
      
  docker:
    list:
      policy: "allow"
    inspect:
      policy: "allow"
    logs:
      policy: "allow"
    action:
      policy: "hitl"  # Container control requires approval
      allow_actions:
        - "start"
        - "stop"
        - "restart"
        - "pause"
        - "unpause"
